<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#6b21a8" />
    <meta name="description" content="Your city. Your ride. Your way. Fast, safe and reliable rides across Mandeville and Manchester, Jamaica." />

    <!-- PWA / iOS specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="VilleCabs" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="VilleCabs" />

    <!-- iOS icons -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/logo.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/logo.png" />

    <!-- iOS splash screens -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <link rel="shortcut icon" href="%PUBLIC_URL%/logo.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="VilleCabs" />
    <meta property="og:description" content="Your city. Your ride. Your way. Ride-hailing in Mandeville, Jamaica." />
    <meta property="og:image" content="https://www.villecabs.com/logo.png" />
    <meta property="og:url" content="https://www.villecabs.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="VilleCabs" />
    <meta name="twitter:description" content="Your city. Your ride. Your way." />
    <meta name="twitter:image" content="https://www.villecabs.com/logo.png" />

    <title>VilleCabs</title>
  </head>

</html>
